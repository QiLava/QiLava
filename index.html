<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>江苏省溧水区高级中学</title>
    <meta name="description" content="江苏省溧水区高级中学 — 根植乡土，心怀天下">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700;900&family=Noto+Sans+SC:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Noto Sans SC', -apple-system, sans-serif;
            background: #0a0e1a;
            color: #e8eaf0;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
        }
        ::selection { background: rgba(212, 175, 55, 0.4); color: #fff; }

        /* ===== BACKGROUND IMAGE ===== */
        .bg-layer {
            position: fixed; inset: 0; z-index: 0;
            overflow: hidden;
        }
        .bg-layer img {
            width: 100%; height: 100%;
            object-fit: cover;
            filter: brightness(0.35) saturate(1.2) contrast(1.1);
            transform: scale(1.02);
            animation: bgZoom 20s ease-in-out infinite alternate;
        }
        @keyframes bgZoom {
            0% { transform: scale(1.02) translateX(0); }
            100% { transform: scale(1.1) translateX(-10px); }
        }
        .bg-overlay {
            position: absolute; inset: 0;
            background:
                linear-gradient(180deg,
                    rgba(10,14,26,0.3) 0%,
                    rgba(10,14,26,0.6) 40%,
                    rgba(10,14,26,0.85) 100%),
                radial-gradient(ellipse at 30% 40%, rgba(212,175,55,0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 70% 60%, rgba(10,14,26,0.6) 0%, transparent 50%);
            z-index: 1;
        }

        /* ===== FLOATING ORBS ===== */
        .orb {
            position: fixed; border-radius: 50%;
            filter: blur(80px);
            pointer-events: none;
            z-index: 1;
            animation: orbFloat 12s ease-in-out infinite;
        }
        .orb-1 {
            width: 400px; height: 400px;
            background: rgba(212,175,55,0.08);
            top: -10%; left: -5%;
            animation-delay: 0s;
        }
        .orb-2 {
            width: 350px; height: 350px;
            background: rgba(180, 150, 42, 0.06);
            bottom: -15%; right: -8%;
            animation-delay: -4s;
        }
        .orb-3 {
            width: 250px; height: 250px;
            background: rgba(212,175,55,0.05);
            top: 50%; left: 50%;
            animation-delay: -8s;
        }
        @keyframes orbFloat {
            0%, 100% { transform: translate(0, 0) scale(1); }
            25% { transform: translate(30px, -40px) scale(1.1); }
            50% { transform: translate(-20px, 20px) scale(0.9); }
            75% { transform: translate(40px, 30px) scale(1.05); }
        }

        /* ===== PARTICLE CANVAS ===== */
        #canvas-bg {
            position: fixed; inset: 0; width: 100%; height: 100%;
            z-index: 2;
        }

        /* ===== MAIN CONTENT ===== */
        .main {
            position: fixed; inset: 0;
            z-index: 3;
            display: flex; align-items: center; justify-content: center;
            text-align: center;
            padding: 32px;
        }

        .content {
            max-width: 960px;
            position: relative;
        }

        /* decorative line above badge */
        .deco-line {
            width: 80px; height: 1px;
            background: linear-gradient(90deg, transparent, #d4af37, transparent);
            margin: 0 auto 24px;
            animation: fadeDown 1s 0.2s both;
        }

        /* badge */
        .badge {
            display: inline-block;
            padding: 7px 24px;
            border: 1px solid rgba(212,175,55,0.3);
            border-radius: 50px;
            font-size: 0.7rem;
            letter-spacing: 5px;
            color: #d4af37;
            margin-bottom: 32px;
            backdrop-filter: blur(12px);
            background: rgba(212,175,55,0.05);
            animation: fadeDown 1s 0.3s both;
            text-transform: uppercase;
        }

        /* title */
        .title-group {
            margin-bottom: 28px;
            animation: fadeUp 1s 0.5s both;
        }
        .title {
            font-family: 'Noto Serif SC', serif;
            font-size: clamp(3.5rem, 9vw, 6.5rem);
            font-weight: 900;
            line-height: 1.1;
            position: relative;
        }
        .title .line1 {
            display: block;
            background: linear-gradient(135deg, #fff 0%, #e8e0c0 60%, #d4af37 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 0 60px rgba(212,175,55,0.15);
        }
        .title .line2 {
            display: block;
            background: linear-gradient(135deg, #d4af37 0%, #f5d980 40%, #8b6914 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 0 60px rgba(212,175,55,0.2);
        }

        .subtitle {
            font-size: clamp(0.8rem, 1.3vw, 1.05rem);
            font-weight: 300;
            color: rgba(255,255,255,0.4);
            letter-spacing: 8px;
            margin-top: 6px;
        }

        /* divider */
        .divider {
            display: flex; align-items: center; justify-content: center;
            gap: 12px;
            margin-bottom: 28px;
            animation: fadeUp 1s 0.7s both;
        }
        .divider span {
            display: block;
        }
        .divider .d-line {
            width: 40px; height: 1px;
            background: rgba(212,175,55,0.3);
        }
        .divider .diamond {
            width: 8px; height: 8px;
            border: 1px solid #d4af37;
            transform: rotate(45deg);
        }

        /* motto */
        .motto-wrap {
            position: relative;
            display: inline-block;
            padding: 16px 40px;
            margin-bottom: 48px;
            animation: fadeUp 1s 0.8s both;
        }
        .motto-wrap::before,
        .motto-wrap::after {
            content: '◆';
            position: absolute;
            font-size: 0.5rem;
            color: rgba(212,175,55,0.3);
        }
        .motto-wrap::before { top: 0; left: 0; }
        .motto-wrap::after { bottom: 0; right: 0; }
        .motto {
            font-family: 'Noto Serif SC', serif;
            font-size: clamp(1.5rem, 3.5vw, 2.6rem);
            font-weight: 700;
            letter-spacing: 20px;
            background: linear-gradient(135deg, #d4af37, #f5d980, #d4af37);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            background-clip: text;
            background-size: 200% 200%;
            animation: shimmer 4s ease-in-out infinite;
        }
        @keyframes shimmer {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        /* ===== QQ GROUP - SINGLE CARD ===== */
        .qq-group {
            display: inline-flex;
            align-items: center;
            gap: 18px;
            padding: 18px 40px;
            background: rgba(10,14,26,0.55);
            backdrop-filter: blur(20px) saturate(1.8);
            border: 1px solid rgba(212,175,55,0.2);
            border-radius: 60px;
            animation: fadeUp 1s 1s both;
            transition: all 0.5s cubic-bezier(0.22, 1, 0.36, 1);
            position: relative;
            overflow: hidden;
            cursor: pointer;
        }
        .qq-group::before {
            content: '';
            position: absolute; inset: 0;
            background: linear-gradient(135deg, rgba(212,175,55,0.08), transparent);
            opacity: 0;
            transition: opacity 0.5s;
        }
        .qq-group:hover::before { opacity: 1; }
        .qq-group:hover {
            border-color: rgba(212,175,55,0.4);
            transform: translateY(-3px) scale(1.02);
            box-shadow:
                0 12px 48px rgba(212,175,55,0.15),
                inset 0 1px 0 rgba(212,175,55,0.1);
        }
        .qq-group .icon-wrap {
            width: 44px; height: 44px;
            border-radius: 50%;
            background: linear-gradient(135deg, rgba(212,175,55,0.2), rgba(212,175,55,0.05));
            border: 1px solid rgba(212,175,55,0.2);
            display: flex; align-items: center; justify-content: center;
            font-size: 1.3rem;
            flex-shrink: 0;
            position: relative;
        }
        .qq-group .icon-wrap .pulse-ring {
            position: absolute; inset: -4px;
            border-radius: 50%;
            border: 1px solid rgba(212,175,55,0.2);
            animation: ringPulse 2s infinite;
        }
        @keyframes ringPulse {
            0% { transform: scale(1); opacity: 1; }
            100% { transform: scale(1.5); opacity: 0; }
        }
        .qq-group .text-group {
            display: flex; flex-direction: column; align-items: flex-start;
        }
        .qq-group .label {
            font-size: 0.6rem;
            letter-spacing: 3px;
            color: rgba(255,255,255,0.35);
            text-transform: uppercase;
        }
        .qq-group .number {
            font-size: 1.35rem;
            font-weight: 700;
            letter-spacing: 5px;
            color: #d4af37;
            line-height: 1.3;
        }
        .qq-group .copy-btn {
            padding: 7px 20px;
            background: linear-gradient(135deg, #d4af37, #b8962a);
            border: none;
            border-radius: 30px;
            color: #0a0e1a;
            font-size: 0.78rem;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.3s;
            letter-spacing: 1px;
            flex-shrink: 0;
        }
        .qq-group .copy-btn:hover {
            transform: scale(1.06);
            box-shadow: 0 4px 20px rgba(212,175,55,0.3);
        }

        /* ===== HINT TEXT BELOW ===== */
        .hint {
            margin-top: 20px;
            font-size: 0.65rem;
            color: rgba(255,255,255,0.15);
            letter-spacing: 2px;
            animation: fadeUp 1s 1.3s both;
        }

        /* ===== ANIMATIONS ===== */
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes fadeDown {
            from { opacity: 0; transform: translateY(-30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ===== TOAST ===== */
        .toast {
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%) translateY(20px);
            background: rgba(10,14,26,0.9);
            backdrop-filter: blur(20px);
            color: #d4af37;
            padding: 14px 36px;
            border-radius: 14px;
            font-size: 0.85rem;
            font-family: inherit;
            z-index: 9999;
            border: 1px solid rgba(212,175,55,0.2);
            box-shadow: 0 8px 48px rgba(0,0,0,0.5);
            opacity: 0;
            transition: all 0.5s cubic-bezier(0.22, 1, 0.36, 1);
            pointer-events: none;
            letter-spacing: 2px;
            white-space: nowrap;
        }
        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        /* ===== SHOOTING STAR ===== */
        .shooting-star {
            position: fixed;
            width: 120px; height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
            z-index: 2;
            pointer-events: none;
            animation: shoot 4s ease-in-out infinite;
            opacity: 0;
        }
        .shooting-star:nth-child(1) { top: 12%; left: 80%; animation-delay: 0s; }
        .shooting-star:nth-child(2) { top: 25%; left: 60%; animation-delay: 2s; width: 80px; }
        @keyframes shoot {
            0% { transform: translateX(0) translateY(0) rotate(-35deg); opacity: 0; }
            2% { opacity: 1; }
            6% { transform: translateX(-200px) translateY(120px) rotate(-35deg); opacity: 0; }
            100% { opacity: 0; }
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 640px) {
            .badge { font-size: 0.6rem; padding: 5px 16px; margin-bottom: 24px; letter-spacing: 3px; }
            .motto { letter-spacing: 10px; font-size: clamp(1.2rem, 5vw, 1.8rem); }
            .motto-wrap { padding: 12px 24px; margin-bottom: 32px; }
            .qq-group {
                flex-wrap: wrap;
                justify-content: center;
                padding: 14px 20px;
                gap: 10px;
                border-radius: 30px;
            }
            .qq-group .text-group { align-items: center; }
            .qq-group .number { font-size: 1.1rem; }
            .divider .d-line { width: 20px; }
            .toast { font-size: 0.75rem; padding: 12px 24px; white-space: normal; }
            .shooting-star { display: none; }
        }
    </style>
</head>
<body>

    <!-- ===== BACKGROUND IMAGE ===== -->
    <div class="bg-layer">
        <img src="https://images.unsplash.com/photo-1562774053-701939374585?w=1920&q=80" alt="校园">
        <div class="bg-overlay"></div>
    </div>

    <!-- ===== FLOATING ORBS ===== -->
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>

    <!-- ===== SHOOTING STARS ===== -->
    <div class="shooting-star"></div>
    <div class="shooting-star"></div>

    <!-- ===== PARTICLE CANVAS ===== -->
    <canvas id="canvas-bg"></canvas>

    <!-- ===== MAIN CONTENT ===== -->
    <div class="main">
        <div class="content">

            <div class="deco-line"></div>

            <div class="badge">✦ 江 苏 省 四 星 级 高 级 中 学</div>

            <div class="title-group">
                <h1 class="title">
                    <span class="line1">溧水区</span>
                    <span class="line2">高级中学</span>
                </h1>
                <p class="subtitle">LI SHUI DISTRICT · SENIOR HIGH SCHOOL</p>
            </div>

            <div class="divider">
                <span class="d-line"></span>
                <span class="diamond"></span>
                <span class="d-line"></span>
            </div>

            <div class="motto-wrap">
                <p class="motto">根植乡土，心怀天下</p>
            </div>

            <!-- === QQ GROUP — single card === -->
            <div class="qq-group" onclick="copyQQ()">
                <div class="icon-wrap">
                    <span>🐧</span>
                    <span class="pulse-ring"></span>
                </div>
                <div class="text-group">
                    <span class="label">QQ 群</span>
                    <span class="number" id="qqNumber">766836907</span>
                </div>
                <button class="copy-btn" onclick="event.stopPropagation(); copyQQ()">复制</button>
            </div>

            <p class="hint">— 点 击 复 制 加 入 —</p>

        </div>
    </div>

    <!-- ===== TOAST ===== -->
    <div class="toast" id="toast"></div>

    <script>
        // ===== PARTICLE CANVAS =====
        (function() {
            const canvas = document.getElementById('canvas-bg');
            const ctx = canvas.getContext('2d');
            let w, h, particles = [];
            const COUNT = 120;

            function resize() { w = canvas.width = window.innerWidth; h = canvas.height = window.innerHeight; }
            window.addEventListener('resize', resize);
            resize();

            class Particle {
                constructor() {
                    this.reset();
                    this.y = Math.random() * h;
                }
                reset() {
                    this.x = Math.random() * w;
                    this.y = Math.random() * h;
                    this.vx = (Math.random() - 0.5) * 0.3;
                    this.vy = (Math.random() - 0.5) * 0.3 - 0.1;
                    this.r = Math.random() * 2.8 + 0.3;
                    this.a = Math.random() * 0.35 + 0.05;
                    this.glow = Math.random() * 0.5;
                }
                update() {
                    this.x += this.vx;
                    this.y += this.vy;
                    if (this.x < 0) this.x = w;
                    if (this.x > w) this.x = 0;
                    if (this.y < 0) this.y = h;
                    if (this.y > h) this.y = 0;
                }
                draw() {
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(255, 255, 255, ${this.a})`;
                    ctx.fill();

                    if (this.glow > 0.3) {
                        ctx.beginPath();
                        ctx.arc(this.x, this.y, this.r * 3, 0, Math.PI * 2);
                        ctx.fillStyle = `rgba(212, 175, 55, ${this.a * 0.15})`;
                        ctx.fill();
                    }
                }
            }

            for (let i = 0; i < COUNT; i++) particles.push(new Particle());

            let mx = w / 2, my = h / 2;
            window.addEventListener('mousemove', e => { mx = e.clientX; my = e.clientY; });

            function drawLines() {
                for (let i = 0; i < particles.length; i++) {
                    for (let j = i + 1; j < particles.length; j++) {
                        const dx = particles[i].x - particles[j].x;
                        const dy = particles[i].y - particles[j].y;
                        const d = Math.sqrt(dx * dx + dy * dy);
                        if (d < 120) {
                            ctx.beginPath();
                            ctx.moveTo(particles[i].x, particles[i].y);
                            ctx.lineTo(particles[j].x, particles[j].y);
                            ctx.strokeStyle = `rgba(212, 175, 55, ${0.04 * (1 - d / 120)})`;
                            ctx.lineWidth = 0.4;
                            ctx.stroke();
                        }
                    }
                    const dx = particles[i].x - mx, dy = particles[i].y - my;
                    const d = Math.sqrt(dx * dx + dy * dy);
                    if (d < 160) {
                        ctx.beginPath();
                        ctx.moveTo(particles[i].x, particles[i].y);
                        ctx.lineTo(mx, my);
                        ctx.strokeStyle = `rgba(212, 175, 55, ${0.03 * (1 - d / 160)})`;
                        ctx.lineWidth = 0.3;
                        ctx.stroke();
                    }
                }
            }

            function animate() {
                ctx.clearRect(0, 0, w, h);
                particles.forEach(p => { p.update(); p.draw(); });
                drawLines();
                requestAnimationFrame(animate);
            }
            animate();
        })();

        // ===== COPY QQ =====
        const QQ = '766836907';

        function copyQQ() {
            if (navigator.clipboard && navigator.clipboard.writeText) {
                navigator.clipboard.writeText(QQ).then(() => showToast('QQ群 766836907 已复制'))
                    .catch(() => fallbackCopy(QQ));
            } else {
                fallbackCopy(QQ);
            }
        }

        function fallbackCopy(text) {
            const ta = document.createElement('textarea');
            ta.value = text;
            ta.style.position = 'fixed';
            ta.style.opacity = '0';
            document.body.appendChild(ta);
            ta.select();
            try { document.execCommand('copy'); showToast('QQ群 766836907 已复制'); }
            catch (e) { alert('复制失败，请手动添加QQ群：' + text); }
            document.body.removeChild(ta);
        }

        function showToast(msg) {
            const el = document.getElementById('toast');
            el.textContent = msg;
            el.classList.add('show');
            clearTimeout(el._timer);
            el._timer = setTimeout(() => el.classList.remove('show'), 2500);
        }
    </script>

</body>
</html>
